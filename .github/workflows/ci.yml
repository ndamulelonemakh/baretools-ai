name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Pytest
        run: uv run pytest -q

      - name: Build
        run: uv build
